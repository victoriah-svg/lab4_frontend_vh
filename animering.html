<!doctype html>
<html lang="sv">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animering</title>
    <link rel="stylesheet" href="/src/CSS/main.scss">
</head>

<body>
    <header id="headerNav" class="topnav">
        <a href="/" id="logo">CSS-Preproccessorer</a>
        <nav>
            <ul class="nav-links">
                <li><a href="/">Startsida</a></li>
                <li><a href="/about">Om SASS</a></li>
                <li><a href="/animering" class="active">Animering</a></li>
                <li><a href="/diagram">Diagram</a></li>
                <li><a href="/karta">Karta</a></li>
            </ul>
        </nav>
        <!--hamburgerikon-->
        <div id="hamburger">
            <img src="/images/menuebar.svg" alt="meny">
        </div>
    </header>
    <main id="mainAnimering">
        <h1 id="animationHeading">Animering</h1>
        <!--liten bild 1-->
        <picture id="smallpic1Container">
            <source type="image/webp" srcset="/images/smallphoto1.webp">
            <img src="/images/smallphoto1.jpg" alt="kvinna framför katedralen Notre Dame i Strasbourg" id="smallPic1"
                class="smallPictures">
        </picture>

        <!--liten bild 2-->
        <picture id="smallpic2Container">
            <source type="image/webp" srcset="/images/smallphoto2.webp">
            <img src="/images/smallphoto2.jpg" alt="gammaldags gatubelysning i petite France" id="smallPic2"
                class="smallPictures">
        </picture>

        <!--liten bild 3-->
        <picture id="smallpic3Container">
            <source type="image/webp" srcset="/images/smallphoto3.webp">
            <img src="/images/smallphoto3.jpg" alt="torg med turistshop i ett regnigt Petite France" id="smallPic3"
                class="smallPictures">
        </picture>

        <!--liten bild 4-->
        <picture id="smallpic4Container">
            <source type="image/webp" srcset="/images/smallphoto4.webp">
            <img src="/images/smallphoto4.jpg" alt="café med uteservering i Petite France" id="smallPic4"
                class="smallPictures">
        </picture>

        <!--Knapp för styling-->
        <button type="submit" id="styleBtn">Add styling!</button>

        <!--Bild 1 katedral-->
        <picture id="windowPic-container">
            <source type="image/webp" srcset="/images/window_1000.webp 1000w,
                    /images/window_500.webp 500w" sizes="(min-width: 1025px) 500px,
                    (min-width: 600px) 500px,
                    250px">

            <source type="image/jpeg" srcset="/images/window_1000.jpp 1000w,
                    /images/window_500.jpp 500w" sizes="(min-width: 1025px) 500px,
                    (min-width: 600px) 500px,
                    2500px">

            <img src="/images/window_500.jpg" alt="Kyrkofönster, Katedralen i Strasbourg" id="windowPic">
        </picture>

    </main>
    <script type="module" src="/src/js/main.js"></script>
</body>

</html>
